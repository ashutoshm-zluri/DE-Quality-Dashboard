# Railway config. Nixpacks auto-detects Node from package.json and runs
# `npm install` then `npm start`, but pinning these here keeps the deploy
# reproducible and version-controlled. Env vars are set in the Railway
# dashboard, not here.
#
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/internal/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
