# Render Blueprint — defines the backend service shape so the next deploy is
# reproducible. Render reads this when you choose "New → Blueprint" and
# point it at this repo. After first deploy, edit env vars in the dashboard.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: de-quality-portal-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/internal/health
    envVars:
      # Static / safe to commit (configuration, not secrets)
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_BUCKET
        value: de-quality-dashboard
      - key: S3_REGION
        value: us-west-2
      - key: S3_PREFIX
        value: ""
      - key: AWS_REGION
        value: us-west-2
      - key: PROD_WRITES_ENABLED
        value: "false"
      - key: DISCOVERY_WINDOW_DAYS
        value: "30"
      - key: STALENESS_HOURS
        value: "48"
      - key: ALLOWED_EMAIL_DOMAIN
        value: zluri.com
      - key: JIRA_BASE_URL
        value: https://zluri.atlassian.net

      # Secrets — set in Render dashboard, NEVER commit
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_SESSION_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: INTERNAL_CRON_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MONGO_URI_DEV
        sync: false
      - key: MONGO_URI_PROD
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: DEV_SAFE_ALLOWLIST
        sync: false
